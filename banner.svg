<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="1020" cy="60" r="220" fill="url(#glow1)"/>
  <circle cx="120" cy="260" r="180" fill="url(#glow2)"/>

  <!-- subtle grid dots -->
  <g fill="#3b3f57" opacity="0.5">
    <circle cx="60" cy="40" r="1.6"/>
    <circle cx="100" cy="40" r="1.6"/>
    <circle cx="140" cy="40" r="1.6"/>
    <circle cx="60" cy="80" r="1.6"/>
    <circle cx="100" cy="80" r="1.6"/>
    <circle cx="140" cy="80" r="1.6"/>
  </g>

  <!-- code bracket motif -->
  <text x="60" y="150" font-family="Menlo, Consolas, monospace" font-size="34" fill="#565f89" opacity="0.7">&lt;/&gt;</text>

  <!-- Name -->
  <text x="60" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#c0caf5">
    Abdelrazak
  </text>

  <!-- Accent underline -->
  <rect x="62" y="145" width="230" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="60" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#a9b1d6">
    Mobile Developer · Computer Science Student @ USTHB
  </text>

  <!-- Sub-tagline -->
  <text x="60" y="218" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#565f89">
    Flutter · Clean Architecture · Go · TypeScript · AI-powered apps
  </text>

  <!-- Tech pills -->
  <g font-family="Menlo, Consolas, monospace" font-size="14" font-weight="600">
    <rect x="60" y="240" width="80" height="30" rx="15" fill="#292e42"/>
    <text x="100" y="260" fill="#7aa2f7" text-anchor="middle">Flutter</text>

    <rect x="152" y="240" width="66" height="30" rx="15" fill="#292e42"/>
    <text x="185" y="260" fill="#bb9af7" text-anchor="middle">Go</text>

    <rect x="230" y="240" width="66" height="30" rx="15" fill="#292e42"/>
    <text x="263" y="260" fill="#7dcfff" text-anchor="middle">C++</text>

    <rect x="308" y="240" width="90" height="30" rx="15" fill="#292e42"/>
    <text x="353" y="260" fill="#9ece6a" text-anchor="middle">Kotlin</text>

    <rect x="410" y="240" width="60" height="30" rx="15" fill="#292e42"/>
    <text x="440" y="260" fill="#f7768e" text-anchor="middle">AI</text>
  </g>

  <!-- Right side decorative terminal card -->
  <g transform="translate(830,60)">
    <rect x="0" y="0" width="310" height="180" rx="14" fill="#1f2335" stroke="#3b3f57" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="6" fill="#f7768e"/>
    <circle cx="40" cy="20" r="6" fill="#e0af68"/>
    <circle cx="60" cy="20" r="6" fill="#9ece6a"/>
    <text x="20" y="55" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7aa2f7">const dev = {</text>
    <text x="36" y="78" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c0caf5">role: <tspan fill="#9ece6a">'Mobile Dev'</tspan>,</text>
    <text x="36" y="101" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c0caf5">focus: <tspan fill="#9ece6a">'Clean Arch'</tspan>,</text>
    <text x="36" y="124" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c0caf5">status: <tspan fill="#e0af68">'shipping'</tspan></text>
    <text x="20" y="147" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7aa2f7">};</text>
  </g>
</svg>
